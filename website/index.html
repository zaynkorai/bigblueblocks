<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Blue Blocks |Puzzle Game</title>
    <meta name="description"
        content="Capture the grid in puzzle game. Challenge your mind and dominate the digital landscape.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@400;700;900&display=swap"

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<body>

    <nav>
        <div class="container nav-wrapper">
            <div class="logo">BIG BLUE <span>BLOCKS</span></div>
        </div>
    </nav>

    <main>
        <section id="hero">
            <div class="container hero-wrapper">
                <div class="hero-content">
                    <h1 class="glitch-text" data-text="Big Blue Blocks">Big Blue Blocks</h1>
                    <p class="subtitle">Enter the world of big blue blocks puzzle experience where every block matters.

                    <div class="hero-actions">

                <div class="hero-visual">
                    <div class="grid-showcase">
